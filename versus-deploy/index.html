            </div>
            {clients.length===0?(
              <div style={{...card,textAlign:"center",padding:"3rem"}}><div style={{fontSize:40,marginBottom:12}}>🚀</div><div style={{fontSize:16,fontWeight:700,fontFamily:"Montserrat,sans-serif",color:D.text,marginBottom:6}}>Aucun client configuré</div><div style={{fontSize:13,color:D.muted,marginBottom:"1.25rem"}}>Ajoutez votre premier site pour commencer.</div><button style={btnP} onClick={openNew}>+ Ajouter un client</button></div>
            ):clients.map(c=>(
              <div key={c.id} style={{...card,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{width:44,height:44,borderRadius:10,background:c.primaryColor,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,fontFamily:"Montserrat,sans-serif",color:"#fff"}}>{c.name.slice(0,2).toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,fontFamily:"Montserrat,sans-serif",color:D.text}}>{c.name}</div>
                  <div style={{fontSize:12,color:D.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.url} · {c.zone}</div>
                  <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>
                    {(c.languages||[]).map(l=><span key={l} style={bdg("info")}>{l}</span>)}
                    {(c.services||"").split(",").slice(0,3).map(s=>s.trim()&&<span key={s} style={bdg("gray")}>{s.trim()}</span>)}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0,flexWrap:"wrap"}}>
                  <button style={{...btnP,...btnSm}} onClick={()=>startGen(c,"news")}>News ↗</button>
                  <button style={{...btnP,...btnSm,background:"#8b0000"}} onClick={()=>startGen(c,"lp")}>Landing Page ↗</button>
                  <button style={{...btnO,...btnSm}} onClick={()=>openEdit(c)}>Modifier</button>
                  <button style={{...btnO,...btnSm,color:"#ef4444",borderColor:"rgba(239,68,68,0.3)"}} onClick={()=>delCli(c.id)}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* NEWS */}
        {view==="news"&&(
          <div>
            {!selClient?(<div style={{...card,textAlign:"center",padding:"3rem"}}><div style={{fontSize:14,color:D.muted,marginBottom:12}}>Sélectionnez d'abord un client</div><button style={btnP} onClick={()=>setView("clients")}>Voir les clients</button></div>):(
              <div>
                <GenHeader type="news"/>
                <StepBar step={genStep}/>
                {genStep===1&&(<div><CtxCard/><div style={{display:"flex",gap:10}}><button style={btnP} onClick={()=>setGenStep(2)}>Continuer →</button><button style={{...btnO,...btnSm}} onClick={()=>openEdit(selClient)}>Modifier la fiche</button></div></div>)}
                {genStep===2&&(
                  <div>
                    <div style={card}>
                      <div style={{fontSize:13,fontWeight:700,color:D.accent,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>Thème & Paramètres</div>
                      <div style={{marginBottom:14}}><label style={lbl}>Thème de la news *<span style={hint}>Décrivez le sujet, l'actu, le contexte</span></label><textarea style={ta} value={gf.theme} onChange={hGf("theme")} placeholder="Ex: Grand froid à Bruxelles — interventions urgentes de nuit pour fuites et conduites gelées, délai 1h max."/></div>
                      <div style={g2}>
                        <div style={{marginBottom:14}}><label style={lbl}>Service concerné</label><input style={inp} value={gf.service} onChange={hGf("service")}/></div>
                        <div style={{marginBottom:14}}><label style={lbl}>Zone géo visée</label><input style={inp} value={gf.zone} onChange={hGf("zone")}/></div>
                      </div>
                      <div><label style={lbl}>Langue</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{(selClient.languages||["Français"]).map(l=><button key={l} onClick={()=>sGf("lang",l)} style={chp(gf.lang===l)}>{l}</button>)}</div></div>
                    </div>
                    <MediaFields vals={gf} handlers={hGf} svc={gf.service} zone={gf.zone}/>
                    <CTAFields/>
                    <div style={{display:"flex",gap:10}}><button style={btnO} onClick={()=>setGenStep(1)}>← Retour</button><button style={{...btnP,opacity:!gf.theme?.trim()?0.4:1}} onClick={()=>generate("news")} disabled={!gf.theme?.trim()}>Générer news + post GMB ↗</button></div>
                  </div>
                )}
                {genStep===3&&<Loading type="news"/>}
                {genStep===4&&<ResultPanel type="news"/>}
              </div>
            )}
          </div>
        )}

        {/* LANDING PAGE */}
        {view==="lp"&&(
          <div>
            {!selClient?(<div style={{...card,textAlign:"center",padding:"3rem"}}><div style={{fontSize:14,color:D.muted,marginBottom:12}}>Sélectionnez d'abord un client</div><button style={btnP} onClick={()=>setView("clients")}>Voir les clients</button></div>):(
              <div>
                <GenHeader type="lp"/>
                <StepBar step={genStep}/>
                {genStep===1&&(<div><CtxCard/><div style={{display:"flex",gap:10}}><button style={btnP} onClick={()=>setGenStep(2)}>Continuer →</button><button style={{...btnO,...btnSm}} onClick={()=>openEdit(selClient)}>Modifier la fiche</button></div></div>)}
                {genStep===2&&(
                  <div>
                    <div style={card}>
                      <div style={{fontSize:13,fontWeight:700,color:D.accent,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>Paramètres de la Landing Page</div>
                      <div style={{marginBottom:14}}><label style={lbl}>Type de landing page</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{[["service","Par service"],["zone","Par zone"],["both","Service + Zone"]].map(([v,l])=><button key={v} onClick={()=>sLf("lpType",v)} style={chp(lf.lpType===v)}>{l}</button>)}</div></div>
                      <div style={g2}>
                        <div style={{marginBottom:14}}><label style={lbl}>Service ciblé</label><input style={inp} value={lf.service} onChange={hLf("service")} placeholder="Plomberie urgence"/></div>
                        <div style={{marginBottom:14}}><label style={lbl}>Zone ciblée</label><input style={inp} value={lf.zone} onChange={hLf("zone")} placeholder="Bruxelles"/></div>
                      </div>
                      <div><label style={lbl}>Langue</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{(selClient.languages||["Français"]).map(l=><button key={l} onClick={()=>sLf("lang",l)} style={chp(lf.lang===l)}>{l}</button>)}</div></div>
                    </div>
                    <div style={card}>
                      <div style={{fontSize:13,fontWeight:700,color:D.accent,textTransform:"uppercase",letterSpacing:".06em",marginBottom:14}}>CTA actifs</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>{CTA_TYPES.map(t=><button key={t} onClick={()=>togLfCta(t)} style={chp((lf.ctaActive||[]).includes(t))}>{t==="Téléphone"?"📞":t==="WhatsApp"?"💬":"📋"} {t}</button>)}</div>
                      <div style={g2}>
                        {(lf.ctaActive||[]).includes("Téléphone")&&<div style={{marginBottom:12}}><label style={lbl}>Numéro de téléphone</label><input style={inp} value={lf.phone} onChange={hLf("phone")} placeholder="+32 2 xxx xx xx"/></div>}
                        {(lf.ctaActive||[]).includes("WhatsApp")&&<div style={{marginBottom:12}}><label style={lbl}>Numéro WhatsApp</label><input style={inp} value={lf.whatsapp} onChange={hLf("whatsapp")} placeholder="+32 4xx xx xx xx"/></div>}
                        {(lf.ctaActive||[]).includes("Formulaire de contact")&&<div style={{marginBottom:12}}><label style={lbl}>URL formulaire</label><input style={inp} value={lf.formUrl} onChange={hLf("formUrl")} placeholder="https://..."/></div>}
                      </div>
                    </div>
                    <div style={card}>
                      <div style={{fontSize:13,fontWeight:700,color:D.accent,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Avis clients</div>
                      <div style={{fontSize:12,color:D.muted,marginBottom:10}}>Copiez 2-3 avis depuis Google My Business et collez-les ici. L'IA les intègre avec le bon formatage et le schema Review.</div>
                      <textarea style={ta} value={lf.reviews} onChange={hLf("reviews")} placeholder={"Jean-Pierre D. (Ixelles) ★★★★★ : Intervention en 45 min, sérieux et propre.\n\nMarie V. (Etterbeek) ★★★★★ : Excellent, je recommande vivement."}/>
                      {!lf.reviews&&<div style={{fontSize:11,color:D.muted,marginTop:4}}>Si vide : l'IA crée 2 avis plausibles à titre d'exemple — à remplacer par les vrais.</div>}
                    </div>
                    <MediaFields vals={lf} handlers={hLf} svc={lf.service} zone={lf.zone}/>
                    <div style={{display:"flex",gap:10}}><button style={btnO} onClick={()=>setGenStep(1)}>← Retour</button><button style={{...btnP,opacity:(!lf.service&&!lf.zone)?0.4:1}} onClick={()=>generate("lp")} disabled={!lf.service&&!lf.zone}>Générer LP + post GMB ↗</button></div>
                  </div>
                )}
                {genStep===3&&<Loading type="lp"/>}
                {genStep===4&&<ResultPanel type="lp"/>}
              </div>
            )}
          </div>
        )}

        {/* HISTORY */}
        {view==="history"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:10}}>
              <div><div style={{fontSize:22,fontWeight:900,fontFamily:"Montserrat,sans-serif",color:D.text}}>Historique <span style={{color:D.accent}}>{filtH.length}</span></div><div style={{fontSize:13,color:D.muted,marginTop:2}}>Évitez les doublons, suivez la stratégie</div></div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <select style={{...inp,width:"auto",minWidth:180}} value={histFilter} onChange={e=>setHistFilter(e.target.value)}><option value="">Tous les clients</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select>
                <select style={{...inp,width:"auto",minWidth:140}} value={histType} onChange={e=>setHistType(e.target.value)}><option value="">Tous types</option><option value="news">News</option><option value="lp">Landing Pages</option></select>
              </div>
            </div>
            {filtH.length===0?(<div style={{...card,textAlign:"center",padding:"2rem"}}><div style={{fontSize:13,color:D.muted}}>Aucun contenu généré pour l'instant.</div></div>):filtH.map(h=>{
              const cl=clients.find(c=>String(c.id)===String(h.clientId));
              return(<div key={h.id} style={{...card,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{width:32,height:32,borderRadius:6,background:cl?.primaryColor||D.accent,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,fontFamily:"Montserrat,sans-serif",color:"#fff"}}>{(h.clientName||"").slice(0,2).toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:D.text}}>{h.title||h.theme}</div><div style={{fontSize:12,color:D.muted,marginTop:2}}>{h.clientName} · {h.zone} · {h.lang}</div></div>
                <span style={bdg(h.type==="lp"?"info":"gray")}>{h.type==="lp"?"LP":"News"}</span>
                <span style={bdg("warn")}>{h.date}</span>
                {h.slug&&<code style={{fontSize:11,background:D.surface2,padding:"2px 8px",borderRadius:4,color:D.muted}}>/{h.slug}</code>}
              </div>);
            })}
          </div>
        )}

        {/* MODAL CLIENT */}
        {showModal&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,overflowY:"auto",padding:"2rem 1rem",display:"flex",justifyContent:"center",alignItems:"flex-start"}} onClick={e=>{if(e.target===e.currentTarget)closeModal()}}>
            <div style={{background:D.surface,border:`1px solid ${D.border}`,borderRadius:16,padding:"1.75rem",width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
                <div style={{fontSize:18,fontWeight:900,fontFamily:"Montserrat,sans-serif",color:D.text}}>{clients.find(c=>c.id===fm.id)?"Modifier":"Nouveau"} client{fm.name&&<span style={{color:D.accent}}> — {fm.name}</span>}</div>
                <button style={{...btnO,...btnSm}} onClick={closeModal}>✕</button>
              </div>
              <div style={sect}>Infos générales</div>
              <div style={g2}><div style={{marginBottom:14}}><label style={lbl}>Nom *</label><input style={inp} value={fm.name} onChange={hFm("name")} placeholder="Plomberie Dupont"/></div><div style={{marginBottom:14}}><label style={lbl}>URL *</label><input style={inp} value={fm.url} onChange={hFm("url")} placeholder="https://www.client.be"/></div></div>
              <div style={{marginBottom:14}}><label style={lbl}>URL médiathèque<span style={hint}>page cachée avec les médias du client</span></label><input style={inp} value={fm.mediaLib||""} onChange={hFm("mediaLib")} placeholder="https://www.client.be/mediatheque-interne"/><div style={{fontSize:11,color:D.muted,marginTop:4}}>Page cachée sur le site du client — Hugo l'ouvre pour copier les URLs des images.</div></div>
              <div style={sep}/>
              <div style={sect}>Stratégie SEO</div>
              <div style={g2}><div style={{marginBottom:14}}><label style={lbl}>Zone géographique</label><input style={inp} value={fm.zone} onChange={hFm("zone")} placeholder="Bruxelles, Namur..."/></div><div style={{marginBottom:14}}><label style={lbl}>Services<span style={hint}>virgules</span></label><input style={inp} value={fm.services} onChange={hFm("services")} placeholder="Plomberie, Débouchage"/></div></div>
              <div style={{marginBottom:14}}><label style={lbl}>Mots-clés prioritaires<span style={hint}>virgules</span></label><input style={inp} value={fm.keywords} onChange={hFm("keywords")} placeholder="plombier bruxelles urgence..."/></div>
              <div style={{marginBottom:14}}><label style={lbl}>Objectifs SEO<span style={hint}>prochains mois</span></label><textarea style={ta} value={fm.objectives} onChange={hFm("objectives")} placeholder="Se positionner sur 'plombier ixelles urgence'..."/></div>
              <div style={{marginBottom:14}}><label style={lbl}>Ton éditorial & infos clés</label><textarea style={ta} value={fm.editorial} onChange={hFm("editorial")} placeholder="Ton direct, rassurant. Famille 1998, 4 techniciens, 19 communes bruxelloises..."/></div>
              <div style={sep}/>
              <div style={sect}>Infos Landing Page</div>
              <div style={{marginBottom:14}}><label style={lbl}>Argument différenciateur</label><input style={inp} value={fm.differentiator||""} onChange={hFm("differentiator")} placeholder="Seul plombier certifié à intervenir en 45 min la nuit dans les 19 communes"/></div>
              <div style={{marginBottom:14}}><label style={lbl}>Chiffres clés</label><input style={inp} value={fm.keyFigures||""} onChange={hFm("keyFigures")} placeholder="15 ans d'expérience, +800 interventions, 24h/7j"/></div>
              <div style={{marginBottom:14}}><label style={lbl}>Villes & quartiers desservis</label><textarea style={{...ta,minHeight:60}} value={fm.cities||""} onChange={hFm("cities")} placeholder="Ixelles, Etterbeek, Saint-Gilles, Forest, Uccle..."/></div>
              <div style={sep}/>
              <div style={sect}>Contact & CTA</div>
              <div style={g2}><div style={{marginBottom:14}}><label style={lbl}>Téléphone</label><input style={inp} value={fm.phone||""} onChange={hFm("phone")} placeholder="+32 2 xxx xx xx"/></div><div style={{marginBottom:14}}><label style={lbl}>WhatsApp</label><input style={inp} value={fm.whatsapp||""} onChange={hFm("whatsapp")} placeholder="+32 4xx xx xx xx"/></div></div>
              <div style={{marginBottom:14}}><label style={lbl}>CTA disponibles</label><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>{CTA_TYPES.map(t=><button key={t} onClick={()=>togFmCta(t)} style={chp((fm.ctaTypes||[]).includes(t))}>{t}</button>)}</div></div>
              <div style={g2}><div style={{marginBottom:14}}><label style={lbl}>Texte CTA principal</label><input style={inp} value={fm.ctaMainText} onChange={hFm("ctaMainText")}/></div><div style={{marginBottom:14}}><label style={lbl}>URL CTA principal</label><input style={inp} value={fm.ctaMainUrl} onChange={hFm("ctaMainUrl")} placeholder="https://..."/></div><div><label style={lbl}>Texte CTA secondaire</label><input style={inp} value={fm.ctaSecText} onChange={hFm("ctaSecText")}/></div><div><label style={lbl}>URL CTA secondaire</label><input style={inp} value={fm.ctaSecUrl} onChange={hFm("ctaSecUrl")} placeholder="https://..."/></div></div>
              <div style={sep}/>
              <div style={sect}>Langues</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>{LANGS.map(l=><button key={l} onClick={()=>togFmLang(l)} style={chp((fm.languages||[]).includes(l))}>{l}</button>)}</div>
              <div style={sep}/>
              <div style={sect}>Style graphique</div>
              <div style={g2}>{[["Couleur primaire","primaryColor"],["Couleur fond","secondaryColor"],["Couleur accent / CTA","accentColor"],["Couleur texte","textColor"]].map(([label,key])=>(
                <div key={key} style={{marginBottom:14}}><label style={lbl}>{label}</label><div style={{display:"flex",gap:8,alignItems:"center"}}><input type="color" value={fm[key]} onChange={e=>sFm(key,e.target.value)} style={{width:40,height:36,padding:2,borderRadius:6,border:`1.5px solid ${D.inputBorder}`,cursor:"pointer",background:D.inputBg}}/><input style={{...inp,flex:1}} value={fm[key]} onChange={hFm(key)}/></div></div>
              ))}</div>
              <div style={g2}><div style={{marginBottom:14}}><label style={lbl}>Police titres</label><select style={inp} value={fm.fontTitle} onChange={hFm("fontTitle")}>{FONTS.map(f=><option key={f}>{f}</option>)}</select></div><div style={{marginBottom:14}}><label style={lbl}>Police corps</label><select style={inp} value={fm.fontBody} onChange={hFm("fontBody")}>{FONTS.map(f=><option key={f}>{f}</option>)}</select></div></div>
              <div style={sep}/>
              <div style={sect}>Présence en ligne</div>
              <div style={g2}><div style={{marginBottom:12}}><label style={lbl}>Google My Business</label><input style={inp} value={fm.gmb||""} onChange={hFm("gmb")} placeholder="https://g.page/..."/></div><div style={{marginBottom:12}}><label style={lbl}>Facebook</label><input style={inp} value={fm.facebook||""} onChange={hFm("facebook")}/></div><div><label style={lbl}>Instagram</label><input style={inp} value={fm.instagram||""} onChange={hFm("instagram")}/></div><div><label style={lbl}>LinkedIn</label><input style={inp} value={fm.linkedin||""} onChange={hFm("linkedin")}/></div></div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:"1.25rem"}}><button style={btnO} onClick={closeModal}>Annuler</button><button style={btnP} onClick={saveCli}>Enregistrer le client</button></div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
